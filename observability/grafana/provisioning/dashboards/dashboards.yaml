# Overrides the otel-lgtm image's dashboard provisioning. Mounting this directory replaces the
# image's own grafana-dashboards.yaml, so the two RED dashboards it ships are re-declared here to keep
# them. (Its JVM dashboard is dropped: this is a Node service.)
apiVersion: 1

providers:
  - name: "SLM"
    type: file
    options:
      path: /etc/grafana/slm-dashboards
      foldersFromFilesStructure: false

  # generated by Tempo's metrics_generator from span kind + status, so these cover the
  # auto-instrumented http/rcon spans as well as our own spanOps
  - name: "RED Metrics (classic histogram)"
    type: file
    options:
      path: /otel-lgtm/grafana-dashboard-red-metrics-classic.json
      foldersFromFilesStructure: false
  - name: "RED Metrics (exponential/native histogram)"
    type: file
    options:
      path: /otel-lgtm/grafana-dashboard-red-metrics-native.json
      foldersFromFilesStructure: false
