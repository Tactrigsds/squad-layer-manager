name: Publish Layer DB

# The layer db is a generated artifact, too big to live in git and too slow to rebuild on every CI
# run. This builds it and attaches it to a rolling `layer-db` release, which the integration tests
# then download and mount at /app/data -- the same path the deployment bind-mounts.
#
# Run this by hand (Actions -> Publish Layer DB -> Run workflow) whenever the layer data changes.
#
# layer-data.json ships alongside the db deliberately: they come out of the same preprocess run, and
# the app reads both. Publishing them together is what stops them drifting apart.

on:
  workflow_dispatch:
    inputs:
      layers_version:
        description: "Layers version to build, e.g. 10.4.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: pnpm/action-setup@v4
        with:
          version: 10.22.0

      - run: pnpm install --frozen-lockfile

      - name: Build the layer db
        env:
          LAYERS_VERSION: ${{ inputs.layers_version }}
        run: |
          pnpm run preprocess all
          ls -la data/

      - name: Publish as a release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LAYERS_VERSION: ${{ inputs.layers_version }}
        run: |
          DB="data/layers_v${LAYERS_VERSION}.sqlite3.gz"
          test -f "$DB" || { echo "preprocess did not produce $DB"; exit 1; }

          # one rolling release the tests always read from, replaced in place
          gh release delete layer-db --yes --cleanup-tag || true
          gh release create layer-db \
            --title "Layer DB (v${LAYERS_VERSION})" \
            --notes "Built by the Publish Layer DB workflow from ${{ github.sha }}. Downloaded and mounted at /app/data by the integration tests." \
            "$DB" \
            data/layer-data.json
