name: Server Agent Release

# Builds the rust server agent (server-agent/agent), attaches per-platform binaries to the GitHub release for
# the tag (the squadjs plugin downloads these by name) and publishes the Docker image to GHCR. Tag a release as
# `server-agent-v<version>` (matching the version in server-agent/agent/Cargo.toml) to publish it.

on:
  push:
    tags:
      - "server-agent-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "existing server-agent-v* tag to build and upload to"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset: slm-server-agent-x86_64-unknown-linux-musl
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: slm-server-agent-x86_64-pc-windows-msvc.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: server-agent/agent
    steps:
      - uses: actions/checkout@v4

      - name: Install musl tools
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update && sudo apt-get install -y musl-tools
          # ring compiles a little C for musl; point cc-rs and the linker at musl-gcc
          echo "CC_x86_64_unknown_linux_musl=musl-gcc" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc" >> "$GITHUB_ENV"

      - name: Install rust target
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: server-agent/agent

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage asset (unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/slm-server-agent ../${{ matrix.asset }}

      - name: Stage asset (windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/slm-server-agent.exe ../${{ matrix.asset }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: server-agent/${{ matrix.asset }}

  # Publishes the agent's Docker image to GHCR so end users can `docker run` it instead of building it.
  # Tags it with the release version (server-agent-v<version> -> <version>) and `latest`.
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tags
        id: meta
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          TAG_NAME="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG_NAME#server-agent-v}"
          IMAGE="ghcr.io/$OWNER/slm-server-agent"
          echo "TAGS=$IMAGE:$VERSION,$IMAGE:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: server-agent/agent
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.TAGS }}
