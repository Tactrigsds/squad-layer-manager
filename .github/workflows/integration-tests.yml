name: SLM Integration Tests

# Runs the integration and e2e suites inside the `test` stage of the production image: the same base,
# the same client build, and the same server bundle the deployment runs (the tests spawn it). What's
# added is a browser, the test sources, and dev dependencies. See the Dockerfile's test stage.

# On pushes to main/dev this runs as a called job of the Docker CI workflow, so that tagging :latest and
# deploying can depend on it (`needs` can't cross workflow boundaries). On PRs it runs on its own.
on:
  workflow_call:
  pull_request:

permissions:
  contents: read

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # The layer db is a generated artifact and, like production, isn't baked into the image -- it's
      # mounted at /app/data. It lives on the `layer-db` release (see the Publish Layer DB workflow),
      # and is cached here so most runs don't re-download it.
      - name: Restore layer db
        id: layer-db-cache
        uses: actions/cache@v4
        with:
          path: data
          key: layer-db-${{ vars.LAYERS_VERSION || 'rolling' }}

      - name: Download layer db
        if: steps.layer-db-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data
          # both, and from the same publish: the app reads the db and its components together
          gh release download layer-db --dir data --clobber \
            --pattern 'layers_v*.sqlite3.gz' --pattern 'layer-data.json' \
            || {
              echo "::error::No 'layer-db' release found. Run the 'Publish Layer DB' workflow to create one."
              exit 1
            }
          # decompress here, once, rather than in every app the tests boot: sqlite cannot open a .gz,
          # so the app would otherwise have to write a decompressed copy into the mount -- and the
          # mount is read-only precisely so that no test can corrupt what the others are reading
          gunzip -kf data/layers_v*.sqlite3.gz
          ls -la data

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: test
          load: true
          tags: slm-test:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run integration and e2e tests
        run: |
          docker run --rm \
            -e CI=true \
            -e LAYERS_VERSION="${{ vars.LAYERS_VERSION || '@latest' }}" \
            -v "$PWD/data:/app/data:ro" \
            -v "$PWD/test-results:/app/test-results" \
            slm-test:ci

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results
          retention-days: 7
          if-no-files-found: ignore
