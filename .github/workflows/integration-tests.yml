name: SLM Integration Tests

# Runs the integration and e2e suites inside the `test` stage of the production image: the same base,
# the same client build, and the same server bundle the deployment runs (the tests spawn it). What's
# added is a browser, the test sources, and dev dependencies. See the Dockerfile's test stage.

# On pushes to main/dev this runs as a called job of the Docker CI workflow, so that tagging :latest and
# deploying can depend on it (`needs` can't cross workflow boundaries). On PRs it runs on its own.
on:
  workflow_call:
  pull_request:

permissions:
  contents: read

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # The layer artifacts are checked in (assets/layers) and baked into the image, so there is nothing to
      # download, cache or mount here: the tests run against the same pair production does.
      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: test
          load: true
          tags: slm-test:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run integration and e2e tests
        run: |
          docker run --rm \
            -e CI=true \
            -v "$PWD/test-results:/app/test-results" \
            slm-test:ci

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results
          retention-days: 7
          if-no-files-found: ignore
