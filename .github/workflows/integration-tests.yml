name: SLM Integration Tests

# Runs the integration and e2e suites inside the `test` stage of the production image: the same base,
# the same client build, and the same server bundle the deployment runs (the tests spawn it). What's
# added is a browser, the test sources, and dev dependencies. See the Dockerfile's test stage.

# On pushes to main/dev this runs as a called job of the Docker CI workflow, so that tagging :latest and
# deploying can depend on it (`needs` can't cross workflow boundaries). On PRs it runs on its own.
on:
  workflow_call:
  pull_request:

permissions:
  contents: read

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # The layer table and its components are generated artifacts and, like production, aren't baked into the
      # image -- they're mounted at /app/data. They live on the `layer-db` release, and are cached here so most
      # runs don't re-download them.
      #
      # The cache key is versioned (-bin): the release used to carry a sqlite db, and a cache entry from that era
      # would restore a data dir with no layer table in it while still counting as a hit, leaving the app to fail
      # at boot with the download step skipped.
      - name: Restore layer table
        id: layer-table-cache
        uses: actions/cache@v4
        with:
          path: data
          key: layer-table-bin-${{ vars.LAYERS_VERSION || 'rolling' }}

      - name: Download layer table
        if: steps.layer-table-cache.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p data
          # both, and from the same publish: the table carries encoded values, layer-data.json is what gives them
          # meaning, and a mismatched pair is worse than a missing one
          gh release download layer-db --dir data --clobber \
            --pattern 'layers_v*.bin.gz' --pattern 'layer-data.json' \
            || {
              echo "::error::No 'layer-db' release found, or it has no layers_v*.bin.gz + layer-data.json. Publish one from \`pnpm preprocess\` output."
              exit 1
            }
          test -f data/layer-data.json || { echo "::error::release has no layer-data.json"; exit 1; }
          compgen -G 'data/layers_v*.bin.gz' > /dev/null || { echo "::error::release has no layers_v*.bin.gz"; exit 1; }
          # the engine gunzips in memory, so the .gz is all the app needs
          ls -la data

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: test
          load: true
          tags: slm-test:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run integration and e2e tests
        run: |
          docker run --rm \
            -e CI=true \
            -e LAYERS_VERSION="${{ vars.LAYERS_VERSION || '@latest' }}" \
            -v "$PWD/data:/app/data:ro" \
            -v "$PWD/test-results:/app/test-results" \
            slm-test:ci

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: test-results
          retention-days: 7
          if-no-files-found: ignore
