name: Log Agent Release

# Builds the rust log agent (log-agent/agent) for each supported platform and attaches the binaries to
# the GitHub release for the tag. Tag a release as `log-agent-v<version>` (matching the version in
# log-agent/agent/Cargo.toml) to publish it. The squadjs plugin downloads these same assets by name.

on:
  push:
    tags:
      - "log-agent-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "existing log-agent-v* tag to build and upload to"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            asset: slm-log-agent-x86_64-unknown-linux-musl
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: slm-log-agent-x86_64-pc-windows-msvc.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: log-agent/agent
    steps:
      - uses: actions/checkout@v4

      - name: Install musl tools
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update && sudo apt-get install -y musl-tools
          # ring compiles a little C for musl; point cc-rs and the linker at musl-gcc
          echo "CC_x86_64_unknown_linux_musl=musl-gcc" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER=musl-gcc" >> "$GITHUB_ENV"

      - name: Install rust target
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: log-agent/agent

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage asset (unix)
        if: matrix.os != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/slm-log-agent ../${{ matrix.asset }}

      - name: Stage asset (windows)
        if: matrix.os == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/slm-log-agent.exe ../${{ matrix.asset }}

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: log-agent/${{ matrix.asset }}
